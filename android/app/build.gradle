plugins {
    id 'com.android.application'
}

android {
    namespace 'xyz.sgjisu.app'
    compileSdk 34

    defaultConfig {
        applicationId "xyz.sgjisu.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            storeFile file("sgjisu-release.jks")
            storePassword "sgjisu2026!"
            keyAlias "sgjisu"
            keyPassword "sgjisu2026!"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
